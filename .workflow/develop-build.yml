version: '1.0'
name: develop-build
displayName: develop构建
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - develop
stages:
  - name: stage-64aaac7a
    displayName: 编译
    strategy: naturally
    trigger: auto
    executor:
      - viagrahuang
    steps:
      - step: build@gcc
        name: build_gcc
        displayName: GCC 构建
        gccVersion: 12.1.0
        commands:
          - '#!/bin/bash'
          - 'set -e  # 遇到错误立即退出'
          - ''
          - '# 1. 解决locale警告（可选，消除干扰）'
          - export LC_ALL=C.UTF-8
          - export LANG=C.UTF-8
          - ''
          - '# 2. 安装基础依赖（先安装sudo，再更新源）'
          - apt-get update && apt-get install -y sudo
          - ''
          - '# 添加Qt6官方源（Ubuntu 20.04）'
          - sudo apt-get install -y software-properties-common
          - sudo add-apt-repository -y ppa:beineri/opt-qt622-focal
          - sudo apt-get update -y
          - ''
          - '# 安装Qt6（需激活环境）'
          - sudo apt-get install -y qt6-base-dev
          - 'source /opt/qt622/bin/qt622-env.sh  # 激活Qt6环境'
          - ''
          - '# 3. 安装Qt开发包（根据项目需求选择Qt5/Qt6，这里以Qt6为例）'
          - sudo apt-get install -y \
          - '    build-essential \'
          - '    cmake \'
          - '    qt6-base-dev \'
          - '    qt6-tools-dev \'
          - '    qt6-tools-dev-tools \'
          - '    libkf5breeze-dev \  # 对应日志中的BREEZE_THEME_INCLUDE_DIR'
          - '    pkg-config'
          - ''
          - '# 4. 确认Qt安装路径（可选，验证安装）'
          - echo "Qt6配置文件路径："
          - find /usr -name "Qt6Config.cmake" || echo "Qt6未找到，尝试Qt5"
          - find /usr -name "Qt5Config.cmake"
          - ''
          - '# 5. 创建并进入构建目录'
          - mkdir -p build
          - cd build
          - ''
          - '# 6. 执行CMake（自动查找Qt，无需手动指定CMAKE_PREFIX_PATH，若仍找不到可手动指定）'
          - cmake -G 'Unix Makefiles' \
          - '      -DCMAKE_BUILD_TYPE=Release \'
          - '      ../'
          - ''
          - '# 7. 编译（根据CPU核心数调整-j参数）'
          - make -j$(nproc)
          - ''
          - '# 8. 安装到指定目录'
          - make install DESTDIR=./deploy
          - ''
          - echo "构建成功！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./bin
        caches: []
        notify: []
        strategy:
          retry: '0'
